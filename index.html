<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate Quotation</title>

  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #000;
      color: #f5d27a;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
    }

    h2 {
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      box-sizing: border-box;
    }

    input {
      background: #1a1a1a;
      color: #ffffff;
    }

    button {
      background: #d4af37;
      color: #000000;
      font-weight: bold;
      cursor: pointer;
    }

    #status {
      text-align: center;
      font-weight: bold;
      margin-top: 12px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Generate Quotation</h2>

  <input id="name" placeholder="Nama penuh">
  <input id="dob" type="date">
  <input id="phone" placeholder="No Telefon">
  <input id="job" placeholder="Pekerjaan">

  <button onclick="submitForm()">GET QUOTATION</button>

  <p id="status"></p>
</div>

<script>
  function submitForm() {
    const formData = {
      name: document.getElementById("name").value,
      dob: document.getElementById("dob").value,
      phone: document.getElementById("phone").value,
      job: document.getElementById("job").value,
      Plan: "Medical",
      Jantina: "Lelaki",
      "Status Merokok": "Tidak"
    };

    document.getElementById("status").innerText = "⏳ Submitting...";

    fetch("https://script.google.com/macros/s/AKfycbw99u5-7IEgF9bPo3aXKtouNAPDoT9LtH2bRuumUCu4_xoT337tmoPyMF7XbO2i9OZH/exec", {
      method: "POST",
      body: JSON.stringify(formData)   // ✅ NO headers → NO preflight → NO CORS
    })
    .then(res => res.text())
    .then(() => {
      document.getElementById("status").innerText = "✅ Submitted successfully";
    })
    .catch(() => {
      document.getElementById("status").innerText = "❌ Submission failed";
    });
  }
</script>

</body>
</html>
