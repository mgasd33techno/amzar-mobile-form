<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" contenttitle>  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ✅ Bootstrap -->
  <link
    href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- ✅ SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@7.12.15/dist/sweetalert2.all.min.js"></script>

  <style>
    .form-container {
      max-width: 500px;
      margin: auto;
      margin-top: 50px;
      padding: 20px;
      background-color: #fff;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
    }
  </style>
</head>

<body class="bg-light">
<div class="container">
  <div class="form-container">
    <h4 class="text-center mb-4">Form Submission to Google Sheet</h4>

    <form id="submit-to-google-sheet">

      <div class="form-group">
        <label>Name</label>
        <input class="form-control" type="text" name="name" required />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input class="form-control" type="email" name="email" required />
      </div>

      <div class="form-group">
        <label>Contact Number</label>
        <input class="form-control" type="text" name="contact_number" required />
      </div>

      <div class="form-group">
        <label>Gender</label>
        <select class="form-control" name="gender" required>
          <option value="" disabled selected hidden>Choose...</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea class="form-control" name="message" required></textarea>
      </div>

      <div class="form-group form-check">
        <input type="checkbox" class="form-check-input" id="age">
        <label class="form-check-label" for="age">
          Check if you are over 18 years old
        </label>
      </div>

      <div class="form-group form-check">
        <input type="checkbox" class="form-check-input" id="ex" required>
        <label class="form-check-label" for="ex">
          I agree with the data terms and policies
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-block">
        Submit
      </button>

    </form>
  </div>
</div>

<script>
  const scriptURL =
    "https://script.google.com/macros/s/AKfycbz2KBQOdRtP8EfX98eDnuN9U28-WHP1AWwIv72gwgZORZk-5Z9OnPnFSc-KPcZ5mxps/exec";

  const form = document.getElementById("submit-to-google-sheet");

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    const formData = new FormData(form);

    // ✅ Match sheet headers exactly
    formData.append("age",
      document.getElementById("age").checked ? "Yes" : "No"
    );
    formData.append("ex",
      document.getElementById("ex").checked ? "Yes" : "No"
    );

    fetch(scriptURL, {
      method: "POST",
      body: formData
    })
    .then(() => {
      swal("Done", "Submitted Successfully.", "success");
      form.reset();
    })
    .catch(() => {
      swal("Error", "Something went wrong. Please try again!", "error");
    });
  });
</script>

</body>
</html>
