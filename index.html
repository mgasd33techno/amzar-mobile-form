<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muqmeen Group | Quotation</title>
 
  <!-- Keep your existing CSS here -->
</head>
 
<body>
 
  <div class="container">
 
    <!-- ================= HEADER / PROFILE ================= -->
    <header class="card center">
      <h2>MUQMEEN GROUP</h2>
 
      <img
        class="profile-img"
        src="./D3300090.png"
        alt="Amzar Irfan - Takaful Advisor"
      >
 
      <p><strong>Amzar Irfan (AI Agent)</strong></p>
 
      <p>
        Certified
        <span class="prudential">Prudential</span>
        <span class="bsn">BSN</span>
        Takaful Advisor
      </p>
    </header>
 
    <!-- ================= FORM SECTION ================= -->
    <main class="card" id="formScreen">
      <h3>Generate Quotation</h3>
 
      <form id="quotationForm" novalidate>
 
        <!-- PLAN -->
        <section>
          <label>Plan</label>
          <div class="btn-group" role="group">
            <button type="button" class="btn-option" onclick="pick(this,'Medical','Plan')">
              Medical
            </button>
            <button type="button" class="btn-option" onclick="pick(this,'Hibah','Plan')">
              Hibah
            </button>
          </div>
        </section>
 
        <!-- NAME -->
        <section>
          <label for="name">Nama Penuh</label>
          <input
            id="name"
            name="Name"
            class="input-box"
            placeholder="Nama penuh"
            required
          >
        </section>
 
        <!-- DOB -->
        <section>
          <label for="dob">Tarikh Lahir</label>
          <input
            id="dob"
            name="DOB"
            type="date"
            class="input-box"
            required
          >
        </section>
 
        <!-- PHONE -->
        <section>
          <label for="phone">No Telefon</label>
          <div class="phone-wrapper">
            <span class="country-code">+60</span>
            <input
              id="phone"
              type="tel"
              placeholder="Contoh: 123456789"
              required
            >
          </div>
          <input type="hidden" name="Phone Number">
        </section>
 
        <!-- OCCUPATION -->
        <section>
          <label for="job">Pekerjaan</label>
          <input
            id="job"
            name="Occupation"
            class="input-box"
            placeholder="Pekerjaan"
            required
          >
        </section>
 
        <!-- GENDER -->
        <section>
          <label>Jantina</label>
          <div class="btn-group">
            <button type="button" class="btn-option" onclick="pick(this,'Male','Sex')">
              Lelaki
            </button>
            <button type="button" class="btn-option" onclick="pick(this,'Female','Sex')">
              Perempuan
            </button>
          </div>
        </section>
 
        <!-- SMOKER -->
        <section>
          <label>Status Merokok</label>
          <div class="btn-group">
            <button type="button" class="btn-option" onclick="pick(this,'No','Smoker')">
              Tidak
            </button>
            <button type="button" class="btn-option" onclick="pick(this,'Yes','Smoker')">
              Ya
            </button>
          </div>
        </section>
 
        <!-- HIDDEN FIELDS -->
        <input type="hidden" name="Plan">
        <input type="hidden" name="Sex">
        <input type="hidden" name="Smoker">
 
        <!-- SUBMIT -->
        <button type="submit">GET QUOTATION</button>
 
        <p id="status" role="alert"></p>
 
      </form>
    </main>
 
    <!-- ================= SUCCESS SCREEN ================= -->
    <section class="card center" id="successScreen" style="display:none;">
      <h2>✅ Submission Successful</h2>
      <p>Terima kasih! Permintaan quotation anda telah diterima.</p>
 
      <button type="button" onclick="resetForm()">
        Submit Another Quotation
      </button>
    </section>
 
  </div>

</div>

<script>
  const scriptURL = "https://script.google.com/macros/s/AKfycbyyQBPv7kb-3xjtFi1oNOrnWKE-5re3WaP98eDUpK21LzH-0Epg17eFp9tx59IOC9xs/exec";
  const whatsappNumber = "60146915481"; // change to your number

  function pick(el, value, name) {
    [...el.parentElement.children].forEach(b => b.classList.remove("active"));
    el.classList.add("active");
    document.querySelector(`input[name="${name}"]`).value = value;
  }

  function showError(msg) {
    document.getElementById("status").innerText = "❌ " + msg;
  }

  function resetForm() {
    successScreen.style.display = "none";
    formScreen.style.display = "block";
    document.getElementById("status").innerText = "";
    quotationForm.reset();
    document.querySelectorAll(".btn-option").forEach(b => b.classList.remove("active"));
  }

  quotationForm.addEventListener("submit", e => {
    e.preventDefault();

    const name = quotationForm["Name"].value.trim();
    const dob = quotationForm["DOB"].value;
    const job = quotationForm["Occupation"].value.trim();
    const plan = quotationForm["Plan"].value;
    const sex = quotationForm["Sex"].value;
    const smoker = quotationForm["Smoker"].value;

    const phoneRaw = phone.value.replace(/\s+/g,"").replace(/^0+/,"");

    if (!plan) return showError("Sila pilih pelan.");
    if (!name) return showError("Sila isi nama penuh.");
    if (!dob) return showError("Sila pilih tarikh lahir.");
    if (!phoneRaw) return showError("Sila isi nombor telefon.");
    if (!job) return showError("Sila isi pekerjaan.");
    if (!sex) return showError("Sila pilih jantina.");
    if (!smoker) return showError("Sila pilih status merokok.");

    quotationForm["Phone Number"].value = "+60" + phoneRaw;
    status.innerText = "⏳ Submitting...";

    fetch(scriptURL, { method:"POST", body:new FormData(quotationForm) })
    .then(() => {
      formScreen.style.display = "none";
      successScreen.style.display = "block";

      const msg =
        `Hi Amzar,%0ASaya telah hantar permohonan quotation.%0A` +
        `Nama: ${name}%0APelan: ${plan}`;

      setTimeout(() => {
        window.open(`https://wa.me/${whatsappNumber}?text=${msg}`, "_blank");
      }, 800);
    })
    .catch(() => showError("Submission failed. Sila cuba lagi."));
  });
</script>

</body>
</html>
